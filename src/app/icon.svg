<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0D1B2A"/>
      <stop offset="100%" stop-color="#060E1A"/>
    </radialGradient>
    <linearGradient id="letter" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F1CF65"/>
      <stop offset="50%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#89CFF0"/>
    </linearGradient>
  </defs>
  <!-- Fondo circular -->
  <circle cx="50" cy="50" r="48" fill="url(#bg)" stroke="#D4AF37" stroke-width="1.5" opacity="0.8"/>
  <!-- Corona pequeña arriba -->
  <path d="M35 30 L40 20 L50 26 L60 20 L65 30 Z" fill="#D4AF37" opacity="0.9"/>
  <!-- Letra L -->
  <text
    x="50" y="72"
    text-anchor="middle"
    font-family="Georgia, serif"
    font-size="44"
    font-style="italic"
    fill="url(#letter)"
    filter="drop-shadow(0 0 4px rgba(212,175,55,0.6))"
  >L</text>
</svg>
